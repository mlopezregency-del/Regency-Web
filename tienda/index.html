<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regency | Portal Privado de Activos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFDFD; }
        .luxury-text { font-family: 'Playfair Display', serif; }
        .bg-vino { background-color: #641E16; }
        .text-vino { color: #641E16; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-vino text-white p-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="luxury-text text-xl tracking-[0.3em] uppercase italic">Regency Overseas</div>
            <div class="flex items-center gap-6">
                <button onclick="toggleCart()" class="relative p-2 hover:bg-white/10 rounded-full transition">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-vino text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="relative h-[25vh] overflow-hidden flex items-center justify-center bg-black">
        <video autoplay muted loop playsinline class="absolute w-full h-full object-cover opacity-40">
            <source src="https://raw.githubusercontent.com/mlopezregency-del/Catalogo-Regency/main/Web/Video%20Web.mp4" type="video/mp4">
        </video>
        <h1 class="relative luxury-text text-white text-4xl uppercase tracking-widest fade-in">Venta de Bodega</h1>
    </header>

    <main class="max-w-7xl mx-auto p-12 w-full flex-grow">
        <div id="grid-productos" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl z-[100] transform translate-x-full transition-transform duration-500 flex flex-col">
        <div class="p-6 bg-vino text-white flex justify-between items-center">
            <h2 class="luxury-text text-xl">Tu Selección</h2>
            <button onclick="toggleCart()"><i data-lucide="x"></i></button>
        </div>
        
        <div id="cart-items" class="flex-grow p-6 overflow-y-auto space-y-4 text-sm">
            </div>

        <div class="p-6 border-t border-gray-100 space-y-4 bg-gray-50">
            <input type="text" id="nombre-empleado" placeholder="Nombre Completo" class="w-full p-3 border rounded-xl text-sm mb-2">
            <input type="email" id="correo-empleado" placeholder="Correo Corporativo" class="w-full p-3 border rounded-xl text-sm">
            
            <div class="flex justify-between font-bold text-lg py-2">
                <span>Total:</span>
                <span id="cart-total">$0</span>
            </div>
            
            <button onclick="enviarPedido()" class="w-full py-4 bg-vino text-white rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-black transition">
                Confirmar y Generar Output SAP
            </button>
        </div>
    </div>

    <script>
        const URL_CSV = 'inventario.csv';
        const RUTA_FOTOS = 'https://raw.githubusercontent.com/mlopezregency-del/Catalogo-Regency/main/';
        let inventario = [];
        let carrito = [];

        function cargarDatos() {
            Papa.parse(URL_CSV, {
                download: true, header: true, dynamicTyping: true,
                complete: function(results) {
                    inventario = results.data.filter(p => p.codigo);
                    render();
                }
            });
        }

        function render() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = inventario.map((p, index) => `
                <div class="bg-white rounded-[30px] p-6 shadow-sm border border-gray-100 fade-in">
                    <img src="${RUTA_FOTOS}${p.codigo}.png" class="h-48 w-full object-contain mb-4" onerror="this.src='https://placehold.co/200x200?text=${p.codigo}'">
                    <div class="space-y-2">
                        <p class="text-[10px] text-gray-400 font-bold uppercase">${p.marca}</p>
                        <h3 class="font-bold text-gray-800">${p.codigo}</h3>
                        <p class="text-vino font-bold">$${p.precio.toLocaleString()}</p>
                        <button onclick="agregarAlCarrito(${index})" 
                                class="${p.cantidad > 0 ? 'bg-vino' : 'bg-gray-300'} w-full py-2 text-white rounded-lg text-[9px] uppercase font-bold" 
                                ${p.cantidad > 0 ? '' : 'disabled'}>
                            ${p.cantidad > 0 ? 'Añadir al Carrito' : 'Agotado'}
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function agregarAlCarrito(index) {
            if(inventario[index].cantidad > 0) {
                carrito.push(inventario[index]);
                inventario[index].cantidad--;
                actualizarCarrito();
                render();
            }
        }

        function actualizarCarrito() {
            document.getElementById('cart-count').innerText = carrito.length;
            const itemsCont = document.getElementById('cart-items');
            itemsCont.innerHTML = carrito.map((item, i) => `
                <div class="flex justify-between items-center border-b pb-2 text-xs">
                    <div>
                        <p class="font-bold">${item.codigo}</p>
                        <p class="text-gray-400">$${item.precio.toLocaleString()}</p>
                    </div>
                    <button onclick="quitarDelCarrito(${i})" class="text-red-400 text-[10px]">Quitar</button>
                </div>
            `).join('');
            
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
        }

        function quitarDelCarrito(i) {
            const item = carrito[i];
            const idxOriginal = inventario.findIndex(p => p.codigo === item.codigo);
            inventario[idxOriginal].cantidad++;
            carrito.splice(i, 1);
            actualizarCarrito();
            render();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        function enviarPedido() {
            const nombre = document.getElementById('nombre-empleado').value;
            const correo = document.getElementById('correo-empleado').value;

            if(!nombre || !correo || carrito.length === 0) {
                alert("Por favor completa tus datos y añade productos.");
                return;
            }

            // CREACIÓN DEL OUTPUT PARA SAP
            // Formato: Codigo | Cantidad | Precio | Empleado | Correo
            let sapOutput = "DATOS PARA CARGA SAP:\n\n";
            carrito.forEach(item => {
                sapOutput += `${item.codigo}\t1\t${item.precio}\t${nombre}\t${correo}\n`;
            });

            const mensaje = encodeURIComponent(`Hola, soy ${nombre}. Adjunto mi pedido Regency:\n\n${sapOutput}`);
            window.open(`https://wa.me/5255XXXXXXXX?text=${mensaje}`); // Cambia las X por tu número o el de Comercial
            
            alert("Pedido generado con éxito. Se ha copiado la estructura de datos para el administrador.");
            console.log(sapOutput); // Esto te sirve para copiar y pegar directo a Excel
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>

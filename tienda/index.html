<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regency | Venta Privada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFFFF; }
        .luxury-text { font-family: 'Playfair Display', serif; }
        .bg-vino { background-color: #641E16; }
        .text-vino { color: #641E16; }
        .filter-btn.active { background-color: #641E16; color: white; border-color: #641E16; }
        #login-overlay { background: #FFFFFF; z-index: 1000; }
        /* Transición suave para las imágenes */
        .product-image { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- LOGIN -->
    <div id="login-overlay" class="fixed inset-0 flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center space-y-8">
            <img src="https://raw.githubusercontent.com/mlopezregency-del/Catalogo-Regency/b5e4caa42e3f08917d17cd4393dbf63b74a7d9fb/Logo%20PNG1.png" class="h-16 mx-auto" alt="Logo">
            <h2 class="luxury-text text-3xl uppercase tracking-widest text-vino">Private Access</h2>
            <div class="space-y-4">
                <input type="password" id="access-code" placeholder="CONTRASEÑA" class="w-full p-4 border-b border-gray-300 outline-none focus:border-vino transition text-center tracking-[0.5em]">
                <button onclick="checkAccess()" class="w-full py-4 bg-vino text-white text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-black transition shadow-xl">Entrar</button>
            </div>
        </div>
    </div>

    <!-- CONTENIDO (Oculto inicialmente) -->
    <div id="main-content" class="hidden">
        <nav class="bg-vino text-white p-6 sticky top-0 z-50 shadow-xl">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="luxury-text text-xl tracking-[0.3em] uppercase italic">Regency Overseas</div>
                <button onclick="toggleCart()" class="relative p-2 hover:bg-white/10 rounded-full transition">
                    <i data-lucide="shopping-bag"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-vino text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">0</span>
                </button>
            </div>
        </nav>

        <div class="bg-white border-b sticky top-[76px] z-40">
            <div class="max-w-7xl mx-auto px-8 py-4 flex gap-4 items-center overflow-x-auto">
                <button onclick="filterBy('TODOS')" class="filter-btn active px-6 py-2 rounded-full border text-[10px] font-bold uppercase tracking-widest transition">Todos</button>
                <button onclick="filterBy('Lotus')" class="filter-btn px-6 py-2 rounded-full border text-[10px] font-bold uppercase tracking-widest transition">Lotus</button>
                <button onclick="filterBy('Festina')" class="filter-btn px-6 py-2 rounded-full border text-[10px] font-bold uppercase tracking-widest transition">Festina</button>
                <button onclick="filterBy('Guess')" class="filter-btn px-6 py-2 rounded-full border text-[10px] font-bold uppercase tracking-widest transition">Guess</button>
            </div>
        </div>

        <main class="max-w-7xl mx-auto p-8 w-full">
            <!-- Grid de 3 columnas para imágenes más grandes -->
            <div id="grid-productos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
        </main>
    </div>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl z-[100] translate-x-full flex flex-col transition-transform duration-500">
        <div class="p-6 bg-vino text-white flex justify-between items-center">
            <h2 class="luxury-text text-xl uppercase">Selección</h2>
            <button onclick="toggleCart()"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="flex-grow p-6 overflow-y-auto space-y-4"></div>
        <div class="p-8 border-t bg-gray-50">
            <div class="flex justify-between font-bold text-lg mb-4">
                <span class="text-xs uppercase">Total:</span>
                <span id="cart-total" class="text-vino font-black">$0</span>
            </div>
            <button onclick="alert('Pedido enviado a validación')" class="w-full py-4 bg-vino text-white rounded-xl text-[10px] font-bold uppercase tracking-[0.3em]">Confirmar Pedido</button>
        </div>
    </div>

    <script>
        const URL_CSV = 'inventario.csv';
        const RUTA_FOTOS = 'https://raw.githubusercontent.com/mlopezregency-del/Catalogo-Regency/main/';
        let inventario = [];
        let filtrados = [];
        let carrito = [];

        // Contraseña actualizada
        function checkAccess() {
            const code = document.getElementById('access-code').value;
            if(code === "REGENCY2026") {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                cargarDatos();
            } else {
                alert("Código de acceso inválido");
            }
        }

        function cargarDatos() {
            Papa.parse(`${URL_CSV}?t=${new Date().getTime()}`, {
                download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    inventario = results.data.map(p => {
                        // Limpieza de nombres de columna para evitar el error de los $0
                        return {
                            codigo: String(p["Modelo"] || "").trim(),
                            marca_id: String(p["Marca"] || "").trim(),
                            marca_nombre: String(p["Marca completa"] || "").split(' ')[0],
                            categoria: String(p["Marca completa"] || "").includes('Relojeria') ? 'Relojería' : 'Joyería',
                            cantidad: parseInt(p["Pedido"]) || 0,
                            // Buscamos el precio sin importar si el Excel tiene espacios extra
                            precio_pub: parseFloat(p["Precio público"]) || 0,
                            precio_esp: parseFloat(p["Precio especial"]) || 0,
                            descuento: p["Descuento"] || ""
                        };
                    }).filter(p => p.codigo !== "");
                    filtrados = [...inventario];
                    render();
                }
            });
        }

        function filterBy(marca) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            filtrados = marca === 'TODOS' ? inventario : inventario.filter(p => p.marca_nombre.toLowerCase() === marca.toLowerCase());
            render();
        }

        function render() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = filtrados.map((p, index) => {
                let sub = p.marca_id === "LR" ? "Lotus/" : p.marca_id === "FT" ? "Festina/" : p.marca_id === "GR" ? "GuessWatches/" : "GuessJewelry/";
                const fotoUrl = `${RUTA_FOTOS}${sub}${p.codigo}.png`;
                const agotado = p.cantidad <= 0;

                return `
                <div class="bg-white p-4 transition-all duration-500 relative group">
                    <!-- Badge Descuento Chic -->
                    <div class="absolute top-4 right-4 bg-[#8E1B1B] text-white text-[10px] font-black px-4 py-2 rounded-full z-10 shadow-lg">
                        ${p.descuento}
                    </div>

                    <div class="aspect-square bg-white mb-8 flex items-center justify-center overflow-hidden">
                        <img src="${fotoUrl}" class="product-image max-h-full group-hover:scale-110" onerror="this.src='https://placehold.co/600x600/ffffff/641e16?text=${p.codigo}'">
                    </div>

                    <div class="text-center space-y-2">
                        <p class="text-[9px] font-bold tracking-[0.2em] text-gray-400 uppercase">Modelo ${p.codigo}</p>
                        <h3 class="luxury-text text-3xl text-gray-900 uppercase tracking-tighter">${p.marca_nombre}</h3>
                        <p class="text-[10px] text-gray-400 uppercase tracking-[0.3em] pb-4">${p.categoria}</p>

                        <div class="flex flex-col items-center justify-center border-t border-gray-100 pt-6">
                            <span class="text-gray-300 line-through text-sm mb-1">$${p.precio_pub.toLocaleString()}</span>
                            <span class="text-vino font-black text-4xl tracking-tighter">$${p.precio_esp.toLocaleString()}</span>
                        </div>

                        <div class="pt-6">
                            <button onclick="agregarAlCarrito('${p.codigo}')" 
                                    class="w-full py-5 ${agotado ? 'bg-gray-100 text-gray-400' : 'bg-vino text-white hover:bg-black'} text-[11px] font-bold uppercase tracking-[0.4em] transition-all shadow-md"
                                    ${agotado ? 'disabled' : ''}>
                                ${agotado ? 'Sin Existencias' : 'Añadir Selección'}
                            </button>
                            <p class="text-[9px] mt-3 ${agotado ? 'text-red-400' : 'text-green-600'} font-bold uppercase">Disponibles: ${p.cantidad}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function agregarAlCarrito(codigo) {
            const prod = inventario.find(p => p.codigo === codigo);
            if(prod && prod.cantidad > 0) {
                carrito.push({...prod});
                prod.cantidad--;
                actualizarCarrito();
                render();
            }
        }

        function actualizarCarrito() {
            document.getElementById('cart-count').innerText = carrito.length;
            const itemsCont = document.getElementById('cart-items');
            itemsCont.innerHTML = carrito.map((item, i) => `
                <div class="flex justify-between items-center border-b pb-4">
                    <div>
                        <p class="text-[10px] font-bold text-gray-400">${item.codigo}</p>
                        <p class="font-bold">${item.marca_nombre}</p>
                        <p class="text-vino font-black">$${item.precio_esp.toLocaleString()}</p>
                    </div>
                    <button onclick="quitar(${i})" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2"></i></button>
                </div>`).join('');
            
            const total = carrito.reduce((sum, item) => sum + item.precio_esp, 0);
            document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
            lucide.createIcons();
        }

        function quitar(i) {
            const item = carrito[i];
            inventario.find(p => p.codigo === item.codigo).cantidad++;
            carrito.splice(i, 1);
            actualizarCarrito();
            render();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        lucide.createIcons();
    </script>
</body>
</html>

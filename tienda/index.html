<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regency | Venta Privada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFDFD; }
        .luxury-text { font-family: 'Playfair Display', serif; }
        .bg-vino { background-color: #641E16; }
        .text-vino { color: #641E16; }
        .filter-btn.active { background-color: #641E16; color: white; border-color: #641E16; }
        #login-overlay { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center space-y-8 fade-in">
            <img src="https://raw.githubusercontent.com/mlopezregency-del/Catalogo-Regency/b5e4caa42e3f08917d17cd4393dbf63b74a7d9fb/Logo%20PNG1.png" class="h-16 mx-auto mb-4" alt="Logo">
            <h2 class="luxury-text text-3xl uppercase tracking-widest text-vino">Acceso Privado</h2>
            <p class="text-gray-500 text-sm italic">Por favor, ingresa la clave de acceso corporativo para continuar.</p>
            <input type="password" id="access-code" placeholder="Contraseña" class="w-full p-4 border-b-2 border-gray-200 outline-none focus:border-vino transition text-center text-xl tracking-widest">
            <button onclick="checkAccess()" class="w-full py-4 bg-vino text-white rounded-full text-xs font-bold uppercase tracking-[0.3em] hover:bg-black transition shadow-lg">Entrar al Catálogo</button>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="bg-vino text-white p-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="luxury-text text-xl tracking-[0.3em] uppercase italic">Regency Overseas</div>
            <button onclick="toggleCart()" class="relative p-2 hover:bg-white/10 rounded-full transition">
                <i data-lucide="shopping-bag"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-vino text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <!-- FILTROS -->
    <div class="bg-white border-b sticky top-[76px] z-40 overflow-x-auto">
        <div class="max-w-7xl mx-auto px-8 py-4 flex gap-4 items-center whitespace-nowrap">
            <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mr-2">Filtrar:</span>
            <button onclick="filterBy('TODOS')" class="filter-btn active px-6 py-2 rounded-full border text-[10px] font-bold uppercase tracking-widest transition">Todos</button>
            <button onclick="filterBy('Lotus')" class="filter-btn px-6 py-2 rounded-full border text-[10px] font-bold uppercase tracking-widest transition">Lotus</button>
            <button onclick="filterBy('Festina')" class="filter-btn px-6 py-2 rounded-full border text-[10px] font-bold uppercase tracking-widest transition">Festina</button>
            <button onclick="filterBy('Guess')" class="filter-btn px-6 py-2 rounded-full border text-[10px] font-bold uppercase tracking-widest transition">Guess</button>
        </div>
    </div>

    <!-- GRID -->
    <main class="max-w-7xl mx-auto p-8 w-full flex-grow">
        <div id="grid-productos" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
    </main>

    <!-- CARRITO (SIDEBAR) -->
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl z-[100] translate-x-full flex flex-col transition-transform duration-500">
        <div class="p-6 bg-vino text-white flex justify-between items-center">
            <h2 class="luxury-text text-xl uppercase">Pedido</h2>
            <button onclick="toggleCart()"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="flex-grow p-6 overflow-y-auto space-y-4"></div>
        <form id="luxury-form" class="p-8 border-t bg-gray-50 space-y-4">
            <input type="text" name="Nombre" required placeholder="Nombre" class="w-full p-3 border rounded-xl text-sm outline-none">
            <input type="email" name="Email" required placeholder="Email Corporativo" class="w-full p-3 border rounded-xl text-sm outline-none">
            <textarea name="DETALLES_SAP" id="sap-output" class="hidden"></textarea>
            <div class="flex justify-between font-bold text-lg py-2 border-t">
                <span class="text-xs uppercase">Total:</span>
                <span id="cart-total" class="text-vino font-black">$0</span>
            </div>
            <button type="submit" class="w-full py-4 bg-vino text-white rounded-xl text-[10px] font-bold uppercase tracking-[0.3em]">Enviar Solicitud</button>
        </form>
    </div>

    <script>
        const URL_CSV = 'inventario.csv';
        const RUTA_FOTOS = 'https://raw.githubusercontent.com/mlopezregency-del/Catalogo-Regency/main/';
        let inventario = [];
        let filtrados = [];
        let carrito = [];

        function checkAccess() {
            if(document.getElementById('access-code').value === "REGENCY2024") { // Cambia la clave aquí
                document.getElementById('login-overlay').style.display = 'none';
            } else { alert("Código incorrecto"); }
        }

        function cargarDatos() {
            Papa.parse(`${URL_CSV}?t=${new Date().getTime()}`, {
                download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    inventario = results.data.map(p => ({
                        codigo: String(p["Modelo"] || "").trim(),
                        marca_id: String(p["Marca"] || "").trim(),
                        marca_nombre: String(p["Marca completa"] || "").split(' ')[0],
                        categoria: String(p["Marca completa"] || "").includes('Relojeria') ? 'Relojería' : 'Joyería',
                        cantidad: parseInt(p["Pedido"]) || 0,
                        precio_pub: parseFloat(p["Precio público"]) || 0,
                        precio_esp: parseFloat(p["Precio especial"]) || 0, // Corregido acento
                        descuento: p["Descuento"] || ""
                    })).filter(p => p.codigo !== "");
                    filtrados = [...inventario];
                    render();
                }
            });
        }

        function filterBy(marca) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            filtrados = marca === 'TODOS' ? inventario : inventario.filter(p => p.marca_nombre.toLowerCase() === marca.toLowerCase());
            render();
        }

        function render() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = filtrados.map((p, index) => {
                let sub = p.marca_id === "LR" ? "Lotus/" : p.marca_id === "FT" ? "Festina/" : p.marca_id === "GR" ? "GuessWatches/" : "GuessJewelry/";
                const fotoUrl = `${RUTA_FOTOS}${sub}${p.codigo}.png`;
                const agotado = p.cantidad <= 0;

                return `
                <div class="bg-white rounded-[40px] p-6 border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-500 relative group overflow-hidden">
                    <!-- Badge Chic de Descuento -->
                    <div class="absolute top-6 right-6 bg-[#8E1B1B] text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-lg z-10">
                        ${p.descuento} OFF
                    </div>

                    <div class="aspect-square bg-[#F9F9F9] rounded-[30px] mb-6 flex items-center justify-center p-4">
                        <img src="${fotoUrl}" class="max-h-full transition duration-700 group-hover:scale-110" onerror="this.src='https://placehold.co/400x400/f8f8f8/641e16?text=${p.codigo}'">
                    </div>

                    <div class="space-y-1">
                        <div class="flex justify-between items-center text-[9px] font-bold tracking-widest text-gray-400">
                            <span>MOD: ${p.codigo}</span>
                            <span class="${agotado ? 'text-red-500' : 'text-green-600'}">STOCK: ${p.cantidad}</span>
                        </div>
                        <h3 class="luxury-text text-2xl text-gray-900 uppercase">${p.marca_nombre}</h3>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-4">${p.categoria}</p>

                        <div class="flex items-baseline gap-3 pt-2">
                            <span class="text-gray-300 line-through text-sm">$${p.precio_pub.toLocaleString()}</span>
                            <span class="text-vino font-black text-3xl tracking-tighter">$${p.precio_esp.toLocaleString()}</span>
                        </div>

                        <button onclick="agregarAlCarrito('${p.codigo}')" 
                                class="w-full mt-4 py-4 ${agotado ? 'bg-gray-100' : 'bg-vino hover:bg-black'} text-white rounded-2xl text-[10px] font-bold uppercase tracking-widest transition shadow-md"
                                ${agotado ? 'disabled' : ''}>
                            ${agotado ? 'Agotado' : 'Añadir a mi Selección'}
                        </button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function agregarAlCarrito(codigo) {
            const prod = inventario.find(p => p.codigo === codigo);
            if(prod && prod.cantidad > 0) {
                carrito.push({...prod});
                prod.cantidad--;
                actualizarCarrito();
                render();
            }
        }

        function actualizarCarrito() {
            document.getElementById('cart-count').innerText = carrito.length;
            const itemsCont = document.getElementById('cart-items');
            itemsCont.innerHTML = carrito.map((item, i) => `
                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
                    <div>
                        <p class="text-[10px] font-bold text-gray-400">${item.codigo}</p>
                        <p class="text-sm font-bold">${item.marca_nombre}</p>
                        <p class="text-vino font-black">$${item.precio_esp.toLocaleString()}</p>
                    </div>
                    <button onclick="quitar(${i})" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2"></i></button>
                </div>`).join('');
            
            const total = carrito.reduce((sum, item) => sum + item.precio_esp, 0);
            document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
            lucide.createIcons();
        }

        function quitar(i) {
            const item = carrito[i];
            inventario.find(p => p.codigo === item.codigo).cantidad++;
            carrito.splice(i, 1);
            actualizarCarrito();
            render();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        window.onload = cargarDatos;
    </script>
</body>
</html>

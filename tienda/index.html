<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regency | Venta Privada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFDFD; }
        .luxury-text { font-family: 'Playfair Display', serif; }
        .bg-vino { background-color: #641E16; }
        .text-vino { color: #641E16; }
        .card-shadow { border-radius: 40px; border: 1px solid #F1F1F1; background: #FFF; transition: all 0.4s ease; }
        .card-shadow:hover { shadow: 0 20px 40px rgba(0,0,0,0.05); transform: translateY(-5px); }
        .img-container { background-color: #F9F9F9; border-radius: 30px; }
        .badge-descuento { background-color: #641E16; color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #login-overlay { background: white; z-index: 1000; }
    </style>
</head>
<body class="min-h-screen">

    <!-- ACCESO PRIVADO -->
    <div id="login-overlay" class="fixed inset-0 flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center space-y-8">
            <img src="https://raw.githubusercontent.com/mlopezregency-del/Catalogo-Regency/b5e4caa42e3f08917d17cd4393dbf63b74a7d9fb/Logo%20PNG1.png" class="h-14 mx-auto" alt="Logo">
            <h2 class="luxury-text text-2xl uppercase tracking-widest text-vino">Acceso Privado</h2>
            <div class="space-y-4">
                <input type="password" id="access-code" placeholder="CONTRASEÑA" class="w-full p-4 border-b border-gray-200 outline-none focus:border-vino transition text-center tracking-[0.4em] text-sm">
                <button onclick="checkAccess()" class="w-full py-4 bg-vino text-white text-[10px] font-bold uppercase tracking-[0.3em] rounded-full hover:bg-black transition">Entrar al Catálogo</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <nav class="bg-vino text-white p-6 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="luxury-text text-xl tracking-[0.3em] uppercase italic">Regency Overseas</div>
                <button onclick="toggleCart()" class="relative p-2"><i data-lucide="shopping-bag"></i><span id="cart-count" class="absolute -top-1 -right-1 bg-white text-vino text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center">0</span></button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-12">
            <div id="grid-productos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
        </main>
    </div>

    <!-- CARRITO SIDEBAR -->
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl z-[100] translate-x-full transition-transform duration-500 flex flex-col">
        <div class="p-6 bg-vino text-white flex justify-between items-center">
            <h2 class="luxury-text text-xl uppercase italic">Tu Selección</h2>
            <button onclick="toggleCart()"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="flex-grow p-6 overflow-y-auto space-y-4 text-sm"></div>
        <div class="p-8 border-t bg-gray-50 space-y-4">
            <div class="flex justify-between font-bold text-lg"><span class="text-xs uppercase">Total:</span><span id="cart-total" class="text-vino">$0</span></div>
            <button class="w-full py-4 bg-vino text-white rounded-full text-[10px] font-bold uppercase tracking-[0.3em]">Confirmar Pedido</button>
        </div>
    </div>

    <script>
        const URL_CSV = 'inventario.csv';
        const RUTA_FOTOS = 'https://raw.githubusercontent.com/mlopezregency-del/Catalogo-Regency/main/';
        let inventario = [];

        function checkAccess() {
            if(document.getElementById('access-code').value === "REGENCY2026") {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                cargarDatos();
            } else { alert("Clave Incorrecta"); }
        }

        function cargarDatos() {
            Papa.parse(`${URL_CSV}?t=${new Date().getTime()}`, {
                download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    inventario = results.data.map(p => ({
                        codigo: String(p["Modelo"] || "").trim(),
                        marca_id: String(p["Marca"] || "").trim(),
                        marca_nombre: String(p["Marca completa"] || "").split(' ')[0],
                        categoria: String(p["Marca completa"] || "").includes('Relojeria') ? 'RELOJERÍA' : 'JOYERÍA',
                        stock: parseInt(p["Pedido"]) || 0,
                        // Fix para el precio público:
                        precio_pub: parseFloat(p["Precio público"]) || parseFloat(p["Precio público "]) || 0,
                        precio_esp: parseFloat(p["Precio especial"]) || parseFloat(p["Precio especial "]) || 0,
                        desc: p["Descuento"] || "-0%"
                    })).filter(p => p.codigo !== "");
                    render();
                }
            });
        }

        function render() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = inventario.map((p, index) => {
                let sub = p.marca_id === "LR" ? "Lotus/" : p.marca_id === "FT" ? "Festina/" : p.marca_id === "GR" ? "GuessWatches/" : "GuessJewelry/";
                const fotoUrl = `${RUTA_FOTOS}${sub}${p.codigo}.png`;
                const agotado = p.stock <= 0;

                return `
                <div class="card-shadow p-8 flex flex-col items-center relative">
                    <div class="absolute top-6 right-6 badge-descuento">${p.desc}</div>
                    
                    <div class="w-full flex justify-between items-center mb-6 px-2">
                        <span class="text-[9px] font-bold text-gray-300 tracking-[0.2em] uppercase">${p.codigo}</span>
                        <span class="text-[9px] font-bold ${agotado ? 'text-red-400' : 'text-green-600'} tracking-[0.1em] uppercase">Disponibles: ${p.stock}</span>
                    </div>

                    <div class="img-container w-full aspect-square flex items-center justify-center mb-8 p-4">
                        <img src="${fotoUrl}" class="max-h-full object-contain hover:scale-105 transition duration-500" onerror="this.src='https://placehold.co/400x400/ffffff/641e16?text=${p.codigo}'">
                    </div>

                    <div class="text-center w-full space-y-1">
                        <h3 class="luxury-text text-2xl text-gray-900 uppercase tracking-tight">${p.marca_nombre}</h3>
                        <p class="text-[10px] text-gray-400 uppercase tracking-[0.4em] pb-4">${p.categoria}</p>
                        
                        <div class="flex flex-col items-center pt-4 border-t border-gray-50">
                            <span class="text-gray-300 line-through text-xs">$${p.precio_pub.toLocaleString()}</span>
                            <span class="text-vino font-black text-3xl tracking-tighter mt-1">$${p.precio_esp.toLocaleString()}</span>
                        </div>

                        <button onclick="agregar('${p.codigo}')" ${agotado ? 'disabled' : ''} 
                                class="w-full mt-6 py-4 bg-vino text-white rounded-2xl text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-black transition shadow-lg ${agotado ? 'opacity-50 grayscale' : ''}">
                            ${agotado ? 'Agotado' : 'Añadir a mi Selección'}
                        </button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function agregar(codigo) {
            const p = inventario.find(i => i.codigo === codigo);
            if(p.stock > 0) { p.stock--; render(); actualizarCart(p); }
        }

        let carrito = [];
        function actualizarCart(p) {
            carrito.push(p);
            document.getElementById('cart-count').innerText = carrito.length;
            const items = document.getElementById('cart-items');
            items.innerHTML = carrito.map((c, i) => `<div class="flex justify-between items-center border-b pb-2"><div><p class='font-bold'>${c.marca_nombre}</p><p class='text-vino'>$${c.precio_esp}</p></div><button onclick='eliminar(${i})'><i data-lucide='trash-2' class='w-4'></i></button></div>`).join('');
            document.getElementById('cart-total').innerText = `$${carrito.reduce((s, x) => s + x.precio_esp, 0).toLocaleString()}`;
            lucide.createIcons();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        function eliminar(i) { /* Lógica inversa de stock aquí si es necesario */ carrito.splice(i, 1); actualizarCartSinP(); render(); }
        function actualizarCartSinP() { /* Refrescar UI del carro */ }
        
        lucide.createIcons();
    </script>
</body>
</html>
